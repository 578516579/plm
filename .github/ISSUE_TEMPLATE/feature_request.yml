name: Feature Request / 功能需求
description: 提出新功能或改进现有功能
labels: ["enhancement", "triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        提交功能需求前，请先确认 PRD 中是否已有对应描述（`prd和原型/AgriAI-PLM-完整PRD文档.md`）。
        若 PRD 未覆盖，需同步发起 Proposal（`99-跨阶段/proposals/`）修改 PRD-MAPPING。

  - type: input
    id: prd_section
    attributes:
      label: PRD 章节 / PRD Section
      description: 对应 PRD 的哪个 §？填 "无" 表示 PRD 未覆盖（需同步提 Proposal）
      placeholder: "例如: §3.2.4 任务管理 — 或填 '无'"
    validations:
      required: true

  - type: input
    id: module
    attributes:
      label: 所属模块 / Module
      placeholder: "例如: task / project / dashboard"
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: 解决什么问题 / Problem Statement
      description: 是什么场景/痛点驱动了这个需求？
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 期望的解决方案 / Proposed Solution
      description: 你希望实现什么？如有原型截图请附上
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案 / Alternatives Considered
      description: 有没有考虑过其他方案？为什么不选？

  - type: dropdown
    id: priority
    attributes:
      label: 优先级 / Priority（自评）
      options:
        - P0 — MVP 必须
        - P1 — Phase 2 重要
        - P2 — 锦上添花
        - P3 — 未来考虑

  - type: checkboxes
    id: prd_alignment
    attributes:
      label: PRD 对齐确认 / PRD Alignment
      options:
        - label: 我已确认 PRD-MAPPING.md 中该模块的字段/状态/错误码覆盖了此需求，或我会同步提 Proposal 更新
          required: true
