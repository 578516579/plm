name: Backend Unit Tests

on:
  pull_request:
    branches: [main, claude/silly-lederberg-451a23]
    paths:
      - 'plm-backend/**'
      - '.github/workflows/backend-tests.yml'
  push:
    branches: [main, claude/silly-lederberg-451a23]
    paths:
      - 'plm-backend/**'
      - '.github/workflows/backend-tests.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # 13 PRD-aligned 模块 + 3 已有模块
        module:
          - plm-project
          - plm-requirement
          - plm-sprint
          - plm-task
          - plm-defect
          - plm-testcase
          - plm-document
          - plm-submission
          - plm-release
          - plm-testplan
          - plm-testreport
          - plm-apidoc
          - plm-manual-product
          - plm-mcp
          - plm-integration
      fail-fast: false  # 不要一个 fail 就停其他

    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run unit tests for ${{ matrix.module }}
        working-directory: plm-backend
        run: |
          mvn test -pl ${{ matrix.module }} -am --no-transfer-progress -B
        env:
          # 即使没真实 DB 也要给个 dummy,避免 Spring Boot 启动报错
          DB_PASSWORD: dummy
          JWT_SECRET: dummy-jwt-secret-for-ci-only
          REDIS_HOST: 127.0.0.1

      - name: Upload test report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.module }}-surefire-reports
          path: plm-backend/${{ matrix.module }}/target/surefire-reports/
          retention-days: 7
