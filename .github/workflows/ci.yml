name: CI

on:
  push:
    branches: [main, "release/**"]
  pull_request:
    branches: [main, "release/**"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────
  # Job 1: Backend — compile + unit test
  # ─────────────────────────────────────────
  backend:
    name: Backend (Java 17 / Maven)
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ci_password
          MYSQL_DATABASE: plm
          MYSQL_CHARACTER_SET_SERVER: utf8mb4
          MYSQL_COLLATION_SERVER: utf8mb4_0900_ai_ci
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -pci_password"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Import DB schema
        run: |
          mysql -h 127.0.0.1 -uroot -pci_password --default-character-set=utf8mb4 plm \
            < plm-backend/sql/ry_20260417.sql
          mysql -h 127.0.0.1 -uroot -pci_password --default-character-set=utf8mb4 plm \
            < plm-backend/sql/quartz.sql

      - name: Build & test
        working-directory: plm-backend
        env:
          DB_PASSWORD: ci_password
          REDIS_HOST: 127.0.0.1
          JAVA_TOOL_OPTIONS: >-
            -Dfile.encoding=UTF-8
            -Dsun.jnu.encoding=UTF-8
        run: mvn clean install --no-transfer-progress -T 4

      - name: Upload Surefire reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: "**/target/surefire-reports/**"
          retention-days: 7

  # ─────────────────────────────────────────
  # Job 2: Frontend — lint + build
  # ─────────────────────────────────────────
  frontend:
    name: Frontend (Node / Vite)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: plm-frontend/package.json

      - name: Install dependencies
        working-directory: plm-frontend
        # package-lock.json 未提交（pnpm/yarn workspace 场景），用 npm install
        run: npm install --registry=https://registry.npmmirror.com

      - name: Type-check
        working-directory: plm-frontend
        run: npm run build
        env:
          VITE_BACKEND_URL: http://localhost:8080

      - name: Unit tests
        working-directory: plm-frontend
        run: npm run test:unit --if-present

  # ─────────────────────────────────────────
  # Summary gate — both jobs must pass
  # ─────────────────────────────────────────
  ci-gate:
    name: CI Gate
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.backend.result }}" != "success" || \
                "${{ needs.frontend.result }}" != "success" ]]; then
            echo "::error::One or more CI jobs failed. See individual job logs."
            exit 1
          fi
          echo "All CI checks passed ✓"
