# 项目相关配置
plm:
  # 名称
  name: PLM
  # 版本
  version: 3.9.2
  # 版权年份
  copyrightYear: 2026
  # 文件路径 示例（ Windows配置D:/plm/uploadPath，Linux配置 /home/plm/uploadPath）
  profile: D:/plm/uploadPath
  # 获取ip地址开关
  addressEnabled: false
  # 验证码类型 math 数字计算 char 字符验证
  captchaType: math
  # ==================== AI 多 Provider 集成 (V2) ====================
  # 默认 default-provider=mock → 业务 agent 未指定 provider 时走 mock。
  # 4 个 provider 实现:mock / dify / openai / anthropic
  #   - openai 协议兼容 OpenAI / DeepSeek / 通义 / Moonshot / SiliconFlow 等
  #     (改 base-url 即可切厂商,无需改代码)
  #   - anthropic 走 Claude Messages API (x-api-key + anthropic-version)
  #   - dify 仍走下方 plm.dify.* 配置 (workflow 编排)
  ai:
    default-provider: ${AI_DEFAULT_PROVIDER:mock}
    openai:
      enabled: ${AI_OPENAI_ENABLED:false}
      base-url: ${AI_OPENAI_BASE_URL:https://api.openai.com/v1}
      api-key: ${AI_OPENAI_API_KEY:}
      default-model: ${AI_OPENAI_DEFAULT_MODEL:gpt-4o-mini}
      connect-timeout-ms: ${AI_OPENAI_CONNECT_TIMEOUT_MS:5000}
      read-timeout-ms: ${AI_OPENAI_READ_TIMEOUT_MS:60000}
    anthropic:
      enabled: ${AI_ANTHROPIC_ENABLED:false}
      base-url: ${AI_ANTHROPIC_BASE_URL:https://api.anthropic.com}
      api-key: ${AI_ANTHROPIC_API_KEY:}
      default-model: ${AI_ANTHROPIC_DEFAULT_MODEL:claude-sonnet-4-5}
      version: ${AI_ANTHROPIC_VERSION:2023-06-01}
      connect-timeout-ms: ${AI_ANTHROPIC_CONNECT_TIMEOUT_MS:5000}
      read-timeout-ms: ${AI_ANTHROPIC_READ_TIMEOUT_MS:60000}

  # ==================== Dify AI 编排集成 (PRD §2.3) ====================
  # 默认 enabled=false → 全部走 mock,本地启动零依赖、CI E2E 不抖动。
  # 生产开启:export DIFY_ENABLED=true 且 DIFY_API_KEY=<Dify Service API Key>
  dify:
    enabled: ${DIFY_ENABLED:false}
    base-url: ${DIFY_BASE_URL:https://api.dify.ai/v1}
    api-key: ${DIFY_API_KEY:}
    connect-timeout-ms: ${DIFY_CONNECT_TIMEOUT_MS:5000}
    read-timeout-ms: ${DIFY_READ_TIMEOUT_MS:60000}
    default-user: ${DIFY_DEFAULT_USER:plm-system}
    # agent_type → workflow_id 兜底路由 (tb_ai_agent.dify_workflow_id 优先)
    workflows:
      requirement: ${DIFY_WF_REQUIREMENT:}
      prd:         ${DIFY_WF_PRD:}
      code:        ${DIFY_WF_CODE:}
      test:        ${DIFY_WF_TEST:}
      release:     ${DIFY_WF_RELEASE:}
      ops:         ${DIFY_WF_OPS:}

# 开发环境配置
server:
  # 服务器的HTTP端口，默认为8080
  port: 8080
  servlet:
    # 应用的访问路径
    context-path: /
    # HTTP 请求/响应字符集 — Windows + JDK 17 默认 file.encoding=GBK 会污染 char↔byte 转换，
    # 这里强制 servlet 层 UTF-8（含 form/multipart/请求体回退）。
    # 配合启动参数 -Dfile.encoding=UTF-8 形成双保险。
    encoding:
      charset: UTF-8
      enabled: true
      force: true
  tomcat:
    # tomcat的URI编码
    uri-encoding: UTF-8
    # 连接数满后的排队数，默认为100
    accept-count: 1000
    threads:
      # tomcat最大线程数，默认为200
      max: 800
      # Tomcat启动初始化的线程数，默认值10
      min-spare: 100

# 日志配置
logging:
  level:
    cn.com.bosssfot.dv.plm: debug
    org.springframework: warn

# 用户配置
user:
  password:
    # 密码最大错误次数
    maxRetryCount: 5
    # 密码锁定时间（默认10分钟）
    lockTime: 10

# Spring配置
spring:
  # 资源信息
  messages:
    # 国际化资源文件路径
    basename: i18n/messages
  profiles:
    active: druid
  # 文件上传
  servlet:
    multipart:
      # 单个文件大小
      max-file-size: 10MB
      # 设置总上传的文件大小
      max-request-size: 20MB
  jackson:
    time-zone: GMT+8
    date-format: yyyy-MM-dd HH:mm:ss
  # 服务模块
  devtools:
    restart:
      # 热部署开关
      enabled: true
  data:
    # redis 配置
    redis:
      # 地址
      host: ${REDIS_HOST:localhost}
      # 端口，默认为6379
      port: ${REDIS_PORT:6379}
      # 数据库索引
      database: ${REDIS_DATABASE:0}
      # 密码（生产环境必须通过环境变量注入）
      password: ${REDIS_PASSWORD:}
      # 连接超时时间
      timeout: 10s
      lettuce:
        pool:
          # 连接池中的最小空闲连接
          min-idle: 0
          # 连接池中的最大空闲连接
          max-idle: 8
          # 连接池的最大数据库连接数
          max-active: 8
          # #连接池最大阻塞等待时间（使用负值表示没有限制）
          max-wait: -1ms

# token配置
token:
  # 令牌自定义标识
  header: Authorization
  # 令牌密钥（生产环境务必通过 JWT_SECRET 环境变量覆盖为强随机值，默认值仅本地开发使用）
  secret: ${JWT_SECRET:abcdefghijklmnopqrstuvwxyz}
  # 令牌有效期（默认30分钟）
  expireTime: ${JWT_EXPIRE_MINUTES:30}

# MyBatis配置
mybatis:
  # 搜索指定包别名
  typeAliasesPackage: cn.com.bosssfot.dv.plm.**.domain
  # 配置mapper的扫描，找到所有的mapper.xml映射文件
  mapperLocations: classpath*:mapper/**/*Mapper.xml
  # 加载全局的配置文件
  configLocation: classpath:mybatis/mybatis-config.xml

# PageHelper分页插件
pagehelper:
  helperDialect: mysql
  supportMethodsArguments: true
  params: count=countSql

# Springdoc配置
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    tags-sorter: alpha
  group-configs:
    - group: 'default'
      display-name: '测试模块'
      paths-to-match: '/**'
      packages-to-scan: cn.com.bosssfot.dv.plm.web.controller.tool

# 防盗链配置
referer:
  # 防盗链开关
  enabled: false
  # 允许的域名列表
  allowed-domains: localhost,127.0.0.1

# 防止XSS攻击
xss:
  # 过滤开关
  enabled: true
  # 排除链接（多个用逗号分隔）
  excludes: /system/notice
  # 匹配链接
  urlPatterns: /system/*,/monitor/*,/tool/*
